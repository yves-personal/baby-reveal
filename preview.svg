  <text x="600" y="478" font-family="Georgia, serif" font-size="18" font-style="italic" font-weight="300" fill="#555555" text-anchor="middle">Baby-Enthüllung in drei Akten</text>

  <!-- bottom rule with ornament -->
  <line x1="380" y1="520" x2="555" y2="520" stroke="#1a1a18" stroke-width="0.6" opacity="0.25"/>
  <circle cx="600" cy="520" r="3" fill="none" stroke="#1a1a18" stroke-width="0.7" opacity="0.3"/>
  <line x1="645" y1="520" x2="820" y2="520" stroke="#1a1a18" stroke-width="0.6" opacity="0.25"/>

  <!-- tagline -->
  <text x="600" y="556" font-family="Georgia, serif" font-size="13" fill="#8b7355" text-anchor="middle" letter-spacing="3">KANNST DU ES ERRATEN?</text>
