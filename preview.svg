  <line x1="600" y1="200" x2="600" y2="155" stroke="#2d4a2d" stroke-width="0.9"/>
  <line x1="600" y1="190" x2="578" y2="172" stroke="#2d4a2d" stroke-width="0.7"/>
  <ellipse cx="572" cy="169" rx="8" ry="4.5" transform="rotate(-30 572 169)" stroke="#2d4a2d" stroke-width="0.7" fill="#e8f0e8"/>
  <line x1="600" y1="182" x2="580" y2="166" stroke="#2d4a2d" stroke-width="0.7"/>
  <ellipse cx="575" cy="163" rx="7" ry="4" transform="rotate(-20 575 163)" stroke="#2d4a2d" stroke-width="0.7" fill="#e8f0e8"/>
  <line x1="600" y1="190" x2="622" y2="172" stroke="#2d4a2d" stroke-width="0.7"/>
  <ellipse cx="628" cy="169" rx="8" ry="4.5" transform="rotate(30 628 169)" stroke="#2d4a2d" stroke-width="0.7" fill="#e8f0e8"/>
  <line x1="600" y1="182" x2="620" y2="166" stroke="#2d4a2d" stroke-width="0.7"/>
